<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投喂页 | Sakimu</title>
    <meta
      name="description"
      content="Sakimu 的投喂页，用于展示赞助方式、支持说明和捐助入口。"
    />
    <meta name="theme-color" content="#f7f7f5" />
    <link rel="icon" href="https://q.qlogo.cn/headimg_dl?dst_uin=2811363539&spec=5" />
    <meta property="og:title" content="Sakimu 投喂页" />
    <meta
      property="og:description"
      content="支持作者继续创作与维护工具的捐助页面。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sakimu.com/donate" />
    <link rel="canonical" href="https://sakimu.com/donate" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../site.config.js" defer></script>
    <script src="../app.js" defer></script>
  </head>
  <body data-page="donate">
    <div class="page-shell">
      <header class="site-header container">
        <a class="brand" href="/">Sakimu</a>
        <nav class="site-nav">
          <a href="/">首页</a>
          <a href="https://blog.sakimu.com" target="_blank" rel="noreferrer noopener">博客</a>
          <a href="/tools">工具</a>
          <a href="/donate" class="is-active">投喂</a>
        </nav>
      </header>

      <main class="container page-main donate-main">
        <section class="donate-intro">
          <span class="eyebrow">投喂</span>
          <h1>支付宝投喂</h1>
          <p>
            如果这个小站刚好帮到你，欢迎轻轻投喂一下，让它继续慢慢长大喵～
          </p>
        </section>

        <section class="panel donate-card" id="alipay">
          <div class="donate-card__copy">
            <span class="donate-card__tag">请奶茶计划</span>
            <p class="donate-card__lead">每一点点支持，都会变成继续更新这个站的动力。</p>
            <h2>扫一下就好啦</h2>
            <p>
              用支付宝扫一扫右侧收款码，就可以请小站长喝一杯奶茶喵～
            </p>
            <p class="donate-card__thanks">谢谢你的喜欢，这份心意会被认真收下。</p>
          </div>
          <figure class="donate-card__media">
            <div class="donate-card__poster">
              <span class="donate-card__stamp">ALIPAY</span>
              <img src="./zhifubao-donate.jpg" alt="支付宝收款码" class="donate-card__image" />
            </div>
            <figcaption class="donate-card__caption">支付宝扫码即可</figcaption>
          </figure>
        </section>
      </main>

      <footer class="site-footer container">
        <p class="site-footer__meta">
          <span>© <span data-year></span> Sakimu.</span>
          <span class="site-footer__dot" aria-hidden="true"></span>
          <a
            href="https://beian.miit.gov.cn/"
            target="_blank"
            rel="noreferrer noopener"
          >皖ICP备2020020404号-4</a>
        </p>
      </footer>
    </div>
  </body>
</html>
